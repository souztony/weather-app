<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clima</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>🌤️ Clima</h1>

        <form method="POST">
            <input type="text" id="cidade" name="cidade" placeholder="Digite a cidade" autocomplete="off" required>
            <div id="sugestoes"></div>
            <button type="submit">Buscar</button>
        </form>

        {% if clima %}
            <div class="resultado">
                {% if clima.erro %}
                    <p>{{ clima.erro }}</p>
                {% else %}
                    <h2>{{ clima.cidade }}</h2>
                    <p>🌡️ {{ clima.temperatura }}°C</p>
                    <p>☁️ {{ clima.descricao }}</p>
                {% endif %}
            </div>
        {% endif %}
    </div>

    <script>
        const input = document.getElementById("cidade");
        const sugestoes = document.getElementById("sugestoes");

        input.addEventListener("input", async () => {
            const valor = input.value;

            if (valor.length < 2) {
                sugestoes.innerHTML = "";
                return;
            }

            const res = await fetch(`/buscar_cidades?q=${valor}`);
            const cidades = await res.json();

            sugestoes.innerHTML = "";

            cidades.forEach(cidade => {
                const div = document.createElement("div");
                div.textContent = cidade;

                div.onclick = () => {
                    input.value = cidade;
                    sugestoes.innerHTML = "";
                };

                sugestoes.appendChild(div);
            });
        });
    </script>
</body>
</html>
