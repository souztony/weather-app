<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>🌍 Weather App</h1>

        <form method="POST" onsubmit="mostrarLoading()">
            <input 
                type="text" 
                id="cidade" 
                name="cidade" 
                placeholder="Digite a cidade"
                autocomplete="off"
                required
            >

            <div id="sugestoes"></div>

            <button type="submit">Buscar</button>
        </form>

        <div id="loading" class="hidden">⏳ Buscando...</div>

        {% if clima %}
            <div class="resultado">
                {% if clima.erro %}
                    <p>{{ clima.erro }}</p>
                {% else %}
                    <h2>{{ clima.cidade }}</h2>

                    {% if clima.icone %}
                        <img 
                            src="https://openweathermap.org/img/wn/{{ clima.icone }}@2x.png"
                            class="icone-clima"
                        >
                    {% endif %}

                    <p class="temp">{{ clima.temperatura }}°C</p>
                    <p class="descricao">{{ clima.descricao }}</p>
                {% endif %}
            </div>
        {% endif %}
    </div>

    <script>
        function mostrarLoading() {
            document.getElementById("loading").classList.remove("hidden");
        }

        const input = document.getElementById("cidade");
        const sugestoes = document.getElementById("sugestoes");

        input.addEventListener("input", async () => {
            const valor = input.value;

            if (valor.length < 2) {
                sugestoes.innerHTML = "";
                return;
            }

            try {
                const res = await fetch(`/buscar_cidades?q=${encodeURIComponent(valor)}`);
                const cidades = await res.json();

                sugestoes.innerHTML = "";

                cidades.forEach(cidade => {
                    const div = document.createElement("div");
                    div.textContent = cidade;

                    div.onclick = () => {
                        input.value = cidade;
                        sugestoes.innerHTML = "";
                    };

                    sugestoes.appendChild(div);
                });

            } catch (erro) {
                console.error("Erro no autocomplete:", erro);
            }
        });
    </script>
</body>
</html>
